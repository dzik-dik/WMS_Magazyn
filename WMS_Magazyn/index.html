<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS - System Magazynowy</title>
    
    <!-- Tailwind CSS do responsywnego, nowoczesnego interfejsu -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Biblioteka do skanowania kodów QR -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <!-- SheetJS do eksportu Excel (.xlsx) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- jsPDF oraz html2canvas do perfekcyjnych raportów PDF z polskimi znakami -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Drobne poprawki dla skanera na urządzeniach mobilnych */
        #reader { width: 100%; border-radius: 0.5rem; overflow: hidden; }
        #reader video { object-fit: cover; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto p-4 sm:p-6 space-y-6">
        
        <!-- Nagłówek -->
        <header class="bg-white rounded-xl shadow-sm p-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-blue-600">Magazyn WMS</h1>
                <p class="text-sm text-slate-500">Zarządzanie stanami magazynowymi</p>
            </div>
            <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg shadow transition text-sm font-medium flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                Pobierz Excel
            </button>
        </header>

        <!-- Strefa Skanera -->
        <section class="bg-white rounded-xl shadow-sm p-4">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">Moduł Skanera QR</h2>
            <div id="reader" class="mb-4 bg-slate-50 border-2 border-dashed border-slate-300"></div>
            <div class="flex gap-3 justify-center">
                <button id="btn-start" onclick="startScanner()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg shadow transition font-medium w-full sm:w-auto">Włącz kamerę</button>
                <button id="btn-stop" onclick="stopScanner()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg shadow transition font-medium hidden w-full sm:w-auto">Zatrzymaj</button>
            </div>
        </section>

        <!-- Strefa Analityczna (Tabela) -->
        <section class="bg-white rounded-xl shadow-sm p-4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3 border-b pb-2">
                <h2 class="text-lg font-semibold">Stany Magazynowe</h2>
                <input type="text" id="search-input" placeholder="Wyszukaj produkt..." class="border border-slate-300 rounded-lg px-4 py-2 w-full sm:w-64 focus:ring-2 focus:ring-blue-500 focus:outline-none" onkeyup="filterTable()">
            </div>
            
            <div class="overflow-x-auto hide-scroll rounded-lg border border-slate-200">
                <table class="w-full text-left border-collapse" id="inventory-table">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 text-sm">
                            <th class="p-3 border-b">ID (Kod)</th>
                            <th class="p-3 border-b">Nazwa Produktu</th>
                            <th class="p-3 border-b text-center">Ilość</th>
                            <th class="p-3 border-b text-right">Akcje</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm divide-y divide-slate-200">
                        <!-- Dane generowane dynamicznie -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Okno Modalne Operacji Magazynowych -->
    <div id="modal" class="fixed inset-0 bg-slate-900 bg-opacity-60 z-50 hidden flex justify-center items-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg" id="modal-title">Operacja na produkcie</h3>
                <button onclick="closeModal()" class="text-white hover:text-slate-200 text-2xl leading-none">&times;</button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase">Zeskanowany Kod (ID)</label>
                    <input type="text" id="modal-id" readonly class="w-full mt-1 bg-slate-100 border border-slate-300 rounded-md p-2 text-slate-600 font-mono">
                </div>
                
                <div id="name-container">
                    <label class="block text-xs font-semibold text-slate-500 uppercase">Nazwa Produktu <span id="new-badge" class="hidden text-red-500 font-bold ml-1">(NOWY)</span></label>
                    <input type="text" id="modal-name" class="w-full mt-1 border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Wpisz nazwę...">
                </div>

                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-md border border-slate-200">
                    <span class="text-sm font-semibold text-slate-600">Aktualny stan:</span>
                    <span id="modal-current-qty" class="text-xl font-bold text-blue-600">0</span>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase">Ilość operacyjna</label>
                    <input type="number" id="modal-qty" min="1" step="1" value="1" class="w-full mt-1 border border-slate-300 rounded-md p-3 text-lg text-center font-bold focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div id="modal-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-sm" role="alert"></div>

                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="processStock('sub')" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg shadow-md transition text-sm">Wydaj z magazynu</button>
                    <button onclick="processStock('add')" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow-md transition text-sm">Przyjmij na magazyn</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inicjalizacja bazy danych LocalStorage
        let inventory = JSON.parse(localStorage.getItem('wms_inventory')) || {};
        let html5QrCode;

        // Renderowanie początkowe
        document.addEventListener("DOMContentLoaded", renderTable);

        // --- MODUŁ DŹWIĘKOWY ---
        // Generuje krótki, przyjemny dźwięk 'beep' za pomocą Web Audio API (nie wymaga zewnętrznych plików)
        function playBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); // A5 note
                
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch(e) { console.log("Brak wsparcia dla Audio API", e); }
        }

        // --- MODUŁ SKANERA QR ---
        function startScanner() {
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');

            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, // Główna kamera w telefonach
                config,
                (decodedText, decodedResult) => {
                    playBeep();
                    stopScanner();
                    openModal(decodedText);
                },
                (errorMessage) => {
                    // Ciche ignorowanie błędów szukania kodu w klatce wideo
                }
            ).catch(err => {
                alert("Błąd dostępu do kamery. Sprawdź uprawnienia w przeglądarce. Szczegóły: " + err);
                stopScanner();
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                }).catch(err => console.log("Błąd zatrzymywania skanera", err));
            }
            document.getElementById('btn-start').classList.remove('hidden');
            document.getElementById('btn-stop').classList.add('hidden');
        }

        // --- LOGIKA OPERACJI MAGAZYNOWYCH (MODAL) ---
        function openModal(qrCode) {
            const modal = document.getElementById('modal');
            const item = inventory[qrCode];
            
            document.getElementById('modal-id').value = qrCode;
            document.getElementById('modal-qty').value = "1";
            document.getElementById('modal-error').classList.add('hidden');
            
            const nameInput = document.getElementById('modal-name');
            const newBadge = document.getElementById('new-badge');

            if (item) {
                // Produkt istnieje
                nameInput.value = item.name;
                nameInput.readOnly = true;
                nameInput.classList.add('bg-slate-100');
                document.getElementById('modal-current-qty').innerText = item.quantity;
                newBadge.classList.add('hidden');
            } else {
                // Nowy produkt
                nameInput.value = "";
                nameInput.readOnly = false;
                nameInput.classList.remove('bg-slate-100');
                document.getElementById('modal-current-qty').innerText = "0";
                newBadge.classList.remove('hidden');
                setTimeout(() => nameInput.focus(), 100);
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function processStock(operationType) {
            const id = document.getElementById('modal-id').value;
            let name = document.getElementById('modal-name').value.trim();
            const qtyInput = parseInt(document.getElementById('modal-qty').value);
            const errorDiv = document.getElementById('modal-error');

            errorDiv.classList.add('hidden');

            if (!name) {
                errorDiv.innerText = "Nazwa produktu jest wymagana!";
                errorDiv.classList.remove('hidden');
                return;
            }
            if (isNaN(qtyInput) || qtyInput <= 0) {
                errorDiv.innerText = "Podaj prawidłową ilość (większą niż 0)!";
                errorDiv.classList.remove('hidden');
                return;
            }

            // Inicjalizacja nowego produktu, jeśli nie istnieje
            if (!inventory[id]) {
                inventory[id] = { id: id, name: name, quantity: 0, history: [] };
            }

            // Walidacja wydania
            if (operationType === 'sub' && inventory[id].quantity < qtyInput) {
                errorDiv.innerText = `Błąd: Próbujesz wydać ${qtyInput} szt., a na stanie jest tylko ${inventory[id].quantity} szt.!`;
                errorDiv.classList.remove('hidden');
                return;
            }

            // Aplikowanie zmian
            if (operationType === 'add') {
                inventory[id].quantity += qtyInput;
            } else if (operationType === 'sub') {
                inventory[id].quantity -= qtyInput;
            }

            // Aktualizacja historii
            inventory[id].history.unshift({
                date: new Date().toISOString(),
                type: operationType,
                amount: qtyInput
            });
            
            // Ograniczenie historii do 50 ostatnich operacji
            if(inventory[id].history.length > 50) inventory[id].history.pop();

            // Zapis do LocalStorage i odświeżenie widoku
            localStorage.setItem('wms_inventory', JSON.stringify(inventory));
            renderTable();
            closeModal();
        }

        // --- INTERFEJS UŻYTKOWNIKA (TABELA) ---
        function renderTable(filterText = "") {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            const lowerFilter = filterText.toLowerCase();

            const items = Object.values(inventory);
            if(items.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center p-6 text-slate-500">Magazyn jest pusty. Zeskanuj pierwszy kod.</td></tr>`;
                return;
            }

            items.forEach(item => {
                if (item.name.toLowerCase().includes(lowerFilter) || item.id.toLowerCase().includes(lowerFilter)) {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-blue-50 transition";
                    row.innerHTML = `
                        <td class="p-3 border-b font-mono text-xs text-slate-500">${item.id}</td>
                        <td class="p-3 border-b font-medium">${item.name}</td>
                        <td class="p-3 border-b text-center font-bold text-blue-600">${item.quantity}</td>
                        <td class="p-3 border-b text-right">
                            <button onclick="generatePDF('${item.id}')" class="bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded text-xs transition">Raport PDF</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                }
            });
        }

        function filterTable() {
            const val = document.getElementById('search-input').value;
            renderTable(val);
        }

        // --- EKSPORT DO EXCEL (SheetJS) ---
        function exportToExcel() {
            const data = Object.values(inventory).map(item => ({
                'ID / Kod QR': item.id,
                'Nazwa Produktu': item.name,
                'Stan Magazynowy': item.quantity,
                'Ostatnia Operacja': item.history.length > 0 ? new Date(item.history[0].date).toLocaleString('pl-PL') : 'Brak'
            }));

            if(data.length === 0) {
                alert("Brak danych do wyeksportowania.");
                return;
            }

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Stany Magazynowe");
            XLSX.writeFile(wb, "Baza_WMS.xlsx");
        }

        // --- GENEROWANIE RAPORTU PDF (jsPDF + html2canvas) ---
        // Metoda ta tworzy wirtualny element DOM, stylowany w CSS, i konwertuje go na perfekcyjny PDF, co eliminuje problemy z brakującymi fontami i polskimi znakami.
        async function generatePDF(id) {
            const item = inventory[id];
            if(!item) return;

            // Kontener raportu
            const reportDiv = document.createElement('div');
            // Stylizowanie jak kartka A4, pozycjonowanie poza widokiem ekranu
            reportDiv.style.width = '800px'; 
            reportDiv.style.padding = '40px';
            reportDiv.style.background = 'white';
            reportDiv.style.position = 'absolute';
            reportDiv.style.top = '-9999px';
            reportDiv.style.left = '-9999px';
            reportDiv.style.fontFamily = 'Arial, sans-serif';
            reportDiv.style.color = '#1e293b';

            // Generowanie wierszy historii
            let historyRows = item.history.map(h => `
                <tr style="border-bottom: 1px solid #e2e8f0;">
                    <td style="padding: 12px 8px;">${new Date(h.date).toLocaleString('pl-PL')}</td>
                    <td style="padding: 12px 8px; font-weight: bold; color: ${h.type === 'add' ? '#16a34a' : '#dc2626'};">${h.type === 'add' ? 'Przyjęcie (+)' : 'Wydanie (-)'}</td>
                    <td style="padding: 12px 8px; text-align: right;">${h.amount} szt.</td>
                </tr>
            `).join('');

            if(item.history.length === 0) {
                historyRows = `<tr><td colspan="3" style="padding: 12px 8px; text-align: center; color: #64748b;">Brak historii operacji</td></tr>`;
            }

            // Zawartość raportu HTML
            reportDiv.innerHTML = `
                <div style="border-bottom: 2px solid #2563eb; padding-bottom: 15px; margin-bottom: 30px;">
                    <h1 style="font-size: 28px; color: #2563eb; margin: 0;">Karta Produktu WMS</h1>
                    <p style="color: #64748b; font-size: 14px; margin-top: 5px;">Wygenerowano: ${new Date().toLocaleString('pl-PL')}</p>
                </div>
                <table style="width: 100%; margin-bottom: 40px; font-size: 18px;">
                    <tr>
                        <td style="width: 30%; color: #64748b; padding-bottom: 10px;">ID / Kod QR:</td>
                        <td style="font-family: monospace; font-weight: bold; padding-bottom: 10px;">${item.id}</td>
                    </tr>
                    <tr>
                        <td style="color: #64748b; padding-bottom: 10px;">Nazwa produktu:</td>
                        <td style="font-weight: bold; padding-bottom: 10px;">${item.name}</td>
                    </tr>
                    <tr>
                        <td style="color: #64748b; padding-bottom: 10px;">Aktualny stan:</td>
                        <td style="font-size: 24px; font-weight: bold; color: #2563eb; padding-bottom: 10px;">${item.quantity} szt.</td>
                    </tr>
                </table>
                <h2 style="font-size: 20px; border-bottom: 1px solid #cbd5e1; padding-bottom: 10px; margin-bottom: 15px;">Historia Operacji (max 50)</h2>
                <table style="width: 100%; border-collapse: collapse; font-size: 14px; text-align: left;">
                    <thead>
                        <tr style="background-color: #f1f5f9;">
                            <th style="padding: 12px 8px; border-bottom: 2px solid #cbd5e1;">Data operacji</th>
                            <th style="padding: 12px 8px; border-bottom: 2px solid #cbd5e1;">Rodzaj</th>
                            <th style="padding: 12px 8px; border-bottom: 2px solid #cbd5e1; text-align: right;">Ilość</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${historyRows}
                    </tbody>
                </table>
            `;

            document.body.appendChild(reportDiv);

            try {
                // Wygenerowanie obrazu z HTML z wysoką skalą dla ostrości (scale: 2)
                const canvas = await html2canvas(reportDiv, { scale: 2, useCORS: true });
                const imgData = canvas.toDataURL('image/png');
                
                const { jsPDF } = window.jspdf;
                // Tworzenie dokumentu A4 w pionie (portrait)
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Raport_${item.id}.pdf`);
            } catch (err) {
                console.error("Błąd generowania PDF:", err);
                alert("Wystąpił błąd podczas tworzenia pliku PDF.");
            } finally {
                // Sprzątanie DOM
                document.body.removeChild(reportDiv);
            }
        }
    </script>
</body>
</html>
